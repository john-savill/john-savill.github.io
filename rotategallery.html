<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Random Rotating Image Gallery</title>
	<style>
		body {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}

		.gallery-container {
			background: white;
			border-radius: 20px;
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
			overflow: hidden;
			max-width: 800px;
			width: 100%;
		}

		.gallery {
			display: flex;
			justify-content: center;
			align-items: center;
			position: relative;
			height: 500px;
			overflow: hidden;
		}

		.gallery-item {
			position: absolute;
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			opacity: 0;
			transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
			transform: scale(0.8);
		}

		.gallery-item.active {
			opacity: 1;
			transform: scale(1);
			z-index: 1;
		}

		.gallery-item img {
			max-width: 90%;
			max-height: 400px;
			border-radius: 10px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
			object-fit: cover;
		}

		.gallery-nav {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px 30px;
			background: #F1F2F1;
		}

		.nav-button {
			background-color: rgba(255, 255, 255, 0.7);
			border: none;
			padding: 10px 15px;
			cursor: pointer;
			border-radius: 5px;
		}

		.nav-button:hover {
			background: #ec8d81;
			transform: scale(1.05);
		}

		.nav-button:active {
			transform: scale(0.95);
		}

		.dots-container {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 10px;
		}

		.dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: #ec8d81;
			cursor: pointer;
			transition: all 0.3s ease;
			border: none;
			padding: 0;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.dot.active {
			transform: scale(1.3);
		}
	</style>
</head>

<body style="background-color: #ec8d81;">
	<div class="gallery-container">
		<div class="gallery" id="gallery">
			<div class="gallery-item active">
				<img src="Media/autocheri1.JPG" alt="Image 1">
			</div>
			<div class="gallery-item">
				<img src="Media/autocheri2.JPG" alt="Image 2">
			</div>
			<div class="gallery-item">
				<img src="Media/autocheri3.JPG" alt="Image 3">
			</div>
			<div class="gallery-item">
				<img src="Media/autocheri4.png" alt="Image 4">
			</div>
			<div class="gallery-item">
				<img src="Media/eratos1.JPG" alt="Image 5">
			</div>
			<div class="gallery-item">
				<img src="Media/eratos2.JPG" alt="Image 6">
			</div>
			<div class="gallery-item">
				<img src="Media/eratos3.jpg" alt="Image 7">
			</div>
			<div class="gallery-item">
				<img src="Media/eratos4.jpg" alt="Image 8">
			</div>
			<div class="gallery-item">
				<img src="Media/eratos5.jpg" alt="Image 9">
			</div>
			<div class="gallery-item">
				<img src="Media/eratos6.jpg" alt="Image 10">
			</div>
			<div class="gallery-item">
				<img src="Media/eratos7.jpg" alt="Image 11">
			</div>
			<div class="gallery-item">
				<img src="Media/eratos8.jpg" alt="Image 12">
			</div>
		</div>
		<div class="gallery-nav">
			<button class="nav-button" id="prevBtn">&lt;</button>
			<div class="dots-container" id="dotsContainer"></div>
			<button class="nav-button" id="nextBtn">&gt;</button>
		</div>
	</div>

	<script>
		const gallery = document.getElementById('gallery');
		const items = document.querySelectorAll('.gallery-item');
		const prevBtn = document.getElementById('prevBtn');
		const nextBtn = document.getElementById('nextBtn');
		const dotsContainer = document.getElementById('dotsContainer');
		let currentIndex = 0;
		let autoRotateInterval;

		// Create dots
		items.forEach((_, index) => {
			const dot = document.createElement('button');
			dot.classList.add('dot');
			if (index === 0) dot.classList.add('active');
			dot.addEventListener('click', () => goToSlide(index));
			dotsContainer.appendChild(dot);
		});

		const dots = document.querySelectorAll('.dot');

		function updateGallery() {
			items.forEach((item, index) => {
				item.classList.toggle('active', index === currentIndex);
			});
			dots.forEach((dot, index) => {
				dot.classList.toggle('active', index === currentIndex);
			});
		}

		function nextSlide() {
			currentIndex = (currentIndex + 1) % items.length;
			updateGallery();
		}

		function prevSlide() {
			currentIndex = (currentIndex - 1 + items.length) % items.length;
			updateGallery();
		}

		function goToSlide(index) {
			currentIndex = index;
			updateGallery();
			resetAutoRotate();
		}

		function startAutoRotate() {
			autoRotateInterval = setInterval(nextSlide, 3000);
		}

		function resetAutoRotate() {
			clearInterval(autoRotateInterval);
			startAutoRotate();
		}

		prevBtn.addEventListener('click', () => {
			prevSlide();
			resetAutoRotate();
		});

		nextBtn.addEventListener('click', () => {
			nextSlide();
			resetAutoRotate();
		});

		// Start auto-rotation
		startAutoRotate();

		// Pause on hover
		gallery.addEventListener('mouseenter', () => {
			clearInterval(autoRotateInterval);
		});

		gallery.addEventListener('mouseleave', () => {
			startAutoRotate();
		});
	</script>
</body>

</html>
